<body>

<h1>The Lekki Headmaster WhatsApp study Group</h1>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>
  const firebaseConfig = {
apiKey: "AIzaSyAhaU5XoOuhHprSFVi_8aYskw5_YtUndII",
  authDomain: "lekki-headmaster.firebaseapp.com",
  projectId: "lekki-headmaster",
  storageBucket: "lekki-headmaster.appspot.com",
  messagingSenderId: "771477664597",
  appId: "1:771477664597:web:996380a06b20a7c60775dc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SECRET_KEY= "FLEXITUTORS@2026"
    
const groupLinks = [
"https://chat.whatsapp.com/GHQMusXi3NZ3pBZdqsV140?mode=gi_t",
"https://chat.whatsapp.com/KgCBmmpWjHiCytN6mvqvlj?mode=gi_t",
"https://chat.whatsapp.com/B8UgeGioowJ7nPlgy7g66b?mode=gi_t",
"https://chat.whatsapp.com/Gk5AQHKuuRsAlxhtDTBQ3h?mode=gi_t",
"https://chat.whatsapp.com/Le567bIbE29Kf7iXGBP1Rk?mode=gi_t",
"https://chat.whatsapp.com/D1OW2ygWT1BIQ4QHOLjVH6?mode=gi_t",
"https://chat.whatsapp.com/DYSSK6RDzEHIDB5SUvmt0y?mode=gi_t",
"https://chat.whatsapp.com/FIGZJTlqb8jEpZhfHvNK3h?mode=gi_t",
"https://chat.whatsapp.com/G3KPEqCOSRl4zMiFIAnzOA?mode=gi_t",
"https://chat.whatsapp.com/G4vGY7M5VT5Lqjlye3BPC3?mode=gi_t",
"https://chat.whatsapp.com/Lgt2IFIibys5E0a1B65Jpa?mode=gi_t",
"https://chat.whatsapp.com/HtFQJ5bvzV957Vafgt5b2Z?mode=gi_t"
];

// 🚫 Anti-spam (one join per device)
const btn = document.getElementById("joinBtn");
if (localStorage.getItem("joinedStudyGroup")) {
    btn.innerText = "Already Joined";
    btn.disabled = true;
}

async function joinGroup() {
    if (localStorage.getItem("joinedStudyGroup")) return;

    btn.disabled = true;
    btn.innerText = "Joining...";

    const docRef = db.collection("studyGroup").doc("counts");

    try {
        const selectedIndex = await db.runTransaction(async (transaction) => {
            const doc = await transaction.get(docRef);

            let counts;

            if (!doc.exists || !Array.isArray(doc.data().counts)) {
                counts = Array(groupLinks.length).fill(0);
            } else {
                counts = doc.data().counts;
            }

            let minCount = counts[0];
            let index = 0;

            for (let i = 1; i < counts.length; i++) {
                if (counts[i] < minCount) {
                    minCount = counts[i];
                    index = i;
                }
            }

            counts[index]++;

            transaction.set(docRef, {
                counts,
                secretKey: SECRET_KEY
            });

            return index;
        });

        localStorage.setItem("joinedStudyGroup", "true");
        window.location.href = groupLinks[selectedIndex];

    } catch (error) {
        alert("Please try again.");
        btn.disabled = false;
        btn.innerText = "Join Study Group";
        console.error(error);
    }
}
</script>
